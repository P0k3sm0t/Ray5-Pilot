<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" role="img" aria-label="Ray5 Pilot logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#0e1b2f"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="172" height="172" rx="26" fill="url(#bg)" stroke="#334155"/>
  <g transform="translate(90 90)" stroke="url(#neon)" fill="none" filter="url(#glow)">
    <circle r="53" stroke-width="2.2" opacity=".75"/>
    <circle r="34" stroke-width="1.8" opacity=".85"/>
    <path d="M-8 -45 L8 -45 L20 -24 L20 12 L0 33 L-20 12 L-20 -24 Z" stroke-width="2.5"/>
    <path d="M-22 -2 Q0 14 22 -2" stroke-width="2.2"/>
    <line x1="-63" y1="0" x2="-44" y2="0" stroke-width="1.8"/>
    <line x1="44" y1="0" x2="63" y2="0" stroke-width="1.8"/>
    <line x1="0" y1="-63" x2="0" y2="-44" stroke-width="1.8"/>
    <line x1="0" y1="44" x2="0" y2="63" stroke-width="1.8"/>
    <line x1="26" y1="26" x2="54" y2="54" stroke-width="2.4"/>
  </g>

  <g transform="translate(210 34)">
    <text x="0" y="58" fill="#e2e8f0" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Ray5</text>
    <text x="186" y="58" fill="#38bdf8" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Pilot</text>
    <text x="2" y="98" fill="#94a3b8" font-size="16" font-family="Segoe UI, Arial, sans-serif">HUD Laser Control Interface</text>
    <g transform="translate(0 118)" stroke="#334155">
      <line x1="0" y1="0" x2="510" y2="0"/>
      <line x1="0" y1="12" x2="240" y2="12"/>
      <line x1="266" y1="12" x2="510" y2="12"/>
    </g>
  </g>
</svg>
