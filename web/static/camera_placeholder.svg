<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="Ray5 Pilot camera placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1220"/>
      <stop offset="100%" stop-color="#05070c"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a364f" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="28" y="28" width="1224" height="664" fill="none" stroke="#22d3ee" stroke-width="4"/>
  <rect x="56" y="56" width="1168" height="608" fill="url(#grid)" stroke="#0ea5e9" stroke-width="1" opacity="0.85"/>

  <line x1="640" y1="56" x2="640" y2="664" stroke="#ef4444" stroke-width="2" opacity="0.9"/>
  <line x1="56" y1="360" x2="1224" y2="360" stroke="#ef4444" stroke-width="2" opacity="0.9"/>
  <circle cx="640" cy="360" r="44" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.95"/>
  <circle cx="640" cy="360" r="8" fill="#ef4444"/>

  <g fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif">
    <text x="72" y="92" font-size="26" font-weight="600">Ray5 Pilot camera preview / overlay area</text>
    <text x="72" y="124" font-size="18" opacity="0.95">HUD placeholder - live feed is currently disabled</text>
  </g>

  <g>
    <rect x="508" y="330" width="264" height="60" rx="8" fill="#0b1320" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="640" y="369" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">Camera Disabled</text>
  </g>
</svg>
